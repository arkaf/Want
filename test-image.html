<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }
        .test-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .image-test {
            border: 2px solid #ccc;
            padding: 10px;
            margin: 10px 0;
        }
        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Image Test</h1>
    
    <div class="test-container">
        <h2>Empty State Image Test</h2>
        <div class="image-test">
            <h3>Original Size (500x500px)</h3>
            <img src="assets/empty.png" alt="Empty state image" style="width: 500px; height: 500px; object-fit: contain;">
        </div>
        
        <div class="image-test">
            <h3>Responsive Size</h3>
            <img src="assets/empty.png" alt="Empty state image" style="max-width: 500px; max-height: 500px;">
        </div>
        
        <div class="image-test">
            <h3>With CSS Classes (like in the app)</h3>
            <img src="assets/empty.png" alt="Empty state image" class="empty-image" style="width: 500px; height: 500px; margin-bottom: 2rem; opacity: 0.7; max-width: 90vw; max-height: 50vh;">
        </div>
    </div>
    
    <div class="test-container">
        <h2>Empty State Layout Test</h2>
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; padding: 3rem 1rem; color: #666666; text-align: center;">
            <img src="assets/empty.png" alt="Empty state image" style="width: 500px; height: 500px; margin-bottom: 2rem; opacity: 0.7; max-width: 90vw; max-height: 50vh;">
            <p style="font-size: 1.25rem; font-weight: 500; margin-bottom: 0.5rem; color: #374151;">Your want list is empty</p>
            <p style="font-size: 0.875rem; color: #6b7280;">Add your first item to get started</p>
        </div>
    </div>
</body>
</html>
