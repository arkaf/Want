<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Want</title>
    <meta name="description" content="Your personal wishlist - simple and offline">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="assets/icon-192.svg">
    <script>
        // Fix for CORS issues when running locally
        if (window.location.protocol === 'file:') {
            console.log('Running locally - some PWA features may be limited');
        }
    </script>
</head>
<body>
    <header>
        <div class="header-left">
            <img src="assets/want.svg" alt="Want" class="logo" />
        </div>
        <div class="header-actions">
            <button id="settingsBtn" class="settings-btn" title="Settings">⚙️</button>
            <button id="openAddBtn" class="add-btn">+ Add</button>
        </div>
    </header>

    <main>
        <div id="itemsGrid" class="items-grid">
            <!-- Items will be populated here -->
        </div>
        
        <div id="emptyState" class="empty-state" style="display: none;">
            <p>Your want list is empty</p>
            <p>Add your first item to get started</p>
        </div>
    </main>

    <!-- Add Modal -->
    <div id="addModal" class="modal" style="display: none;">
        <div id="modalBackdrop" class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-grabber"></div>
            <div class="modal-header">
                <h2>Add to Want</h2>
                <button id="closeModal" class="close-btn">&times;</button>
            </div>
            <form id="addForm">
                <div class="form-group">
                    <label for="urlInput">URL *</label>
                    <input type="url" id="urlInput" name="url" required placeholder="https://example.com">
                </div>

                <div id="metaPreview" class="hidden preview">
                    <div class="preview-img-wrap">
                        <img id="previewImg" alt="Preview" />
                    </div>
                    <div class="preview-title" id="previewTitle"></div>
                    <div class="preview-meta">
                        <span id="previewPrice"></span>
                        <span id="previewDomain"></span>
                    </div>
                    <button type="button" id="toggleAdvanced" class="linklike">Edit details</button>
                </div>

                <!-- Advanced fields (hidden by default) -->
                <div id="advanced" class="hidden">
                    <div class="form-group">
                        <label for="titleInput">Title</label>
                        <input type="text" id="titleInput" name="title">
                    </div>
                    <div class="form-group">
                        <label for="priceInput">Price</label>
                        <input type="text" id="priceInput" name="price" placeholder="$99.99">
                    </div>
                    <div class="form-group">
                        <label for="imageInput">Image URL</label>
                        <input type="url" id="imageInput" name="image" placeholder="https://example.com/image.jpg">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" id="addItemBtn" class="btn-primary" disabled>Add Item</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="closeSettingsModal" class="close-btn">&times;</button>
            </div>
            <div class="settings-content">
                <div class="settings-section">
                    <h3>Data Management</h3>
                    <div class="settings-actions">
                        <button id="exportBtn" class="btn-secondary">Export Data</button>
                        <button id="importBtn" class="btn-secondary">Import Data</button>
                    </div>
                    <input type="file" id="importFile" accept=".json" style="display: none;">
                </div>
                <div class="settings-section">
                    <h3>About</h3>
                    <p>Want - Your personal wishlist</p>
                    <p>Version 1.0.0</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" style="display: none;"></div>

    <!-- More menu (reused for all cards) -->
    <div id="moreMenuBackdrop" class="menu-backdrop" hidden></div>
    <div id="moreMenu" class="menu" role="menu" hidden>
        <button type="button" class="menu-item" data-action="share" role="menuitem">Share</button>
        <button type="button" class="menu-item danger" data-action="delete" role="menuitem">Delete</button>
    </div>

    <script src="vendor/idb.min.js"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    
    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(registration => console.log('SW registered'))
                .catch(error => console.log('SW registration failed'));
        }
    </script>
</body>
</html>
